<svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 96 96" role="img" aria-label="Deakin unit logo">
  <defs>
    <linearGradient id="badgeGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1d9bf0"/>
      <stop offset="1" stop-color="#0f509e"/>
    </linearGradient>
  </defs>

  <!-- Rounded square badge -->
  <rect x="6" y="6" width="84" height="84" rx="22" fill="url(#badgeGradient)"/>

  <!-- Inner soft highlight -->
  <rect x="12" y="12" width="72" height="72" rx="20" fill="#ffffff" opacity="0.08"/>

  <!-- Accent bar to hint “unit / course” -->
  <rect x="20" y="26" width="56" height="6" rx="3" fill="#e5f2ff" opacity="0.9"/>

  <!-- Initials -->
  <text x="30" y="60" font-family="Segoe UI, system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="20" font-weight="600" fill="#ffffff">SIT</text>
  <text x="52" y="60" font-family="Segoe UI, system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="20" font-weight="600" fill="#ffffff">753</text>
</svg>

